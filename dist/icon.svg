<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1608"/>
      <stop offset="100%" stop-color="#0c0b08"/>
    </radialGradient>
    <radialGradient id="gold" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#f0dea0"/>
      <stop offset="40%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6c1a"/>
    </radialGradient>
    <radialGradient id="gem" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fefefe"/>
      <stop offset="50%" stop-color="#debb50"/>
      <stop offset="100%" stop-color="#b8942e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.6"/>
  <circle cx="256" cy="256" r="216" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>

  <!-- Gold bar base shape -->
  <rect x="120" y="200" width="272" height="140" rx="14" ry="14" fill="url(#gold)" filter="url(#glow)"/>

  <!-- Bar top face -->
  <polygon points="140,200 372,200 356,168 156,168" fill="#debb50" opacity="0.9"/>

  <!-- Bar right side -->
  <polygon points="372,200 372,340 356,330 356,168" fill="#8a6c1a" opacity="0.85"/>

  <!-- Bar ridges -->
  <line x1="120" y1="240" x2="392" y2="240" stroke="#c9a227" stroke-width="2" opacity="0.5"/>
  <line x1="120" y1="280" x2="392" y2="280" stroke="#c9a227" stroke-width="2" opacity="0.5"/>
  <line x1="120" y1="320" x2="392" y2="320" stroke="#c9a227" stroke-width="2" opacity="0.5"/>

  <!-- "GS" text on bar -->
  <text x="256" y="285" font-family="Georgia, serif" font-size="64" font-weight="bold"
        text-anchor="middle" fill="#0c0b08" opacity="0.35" letter-spacing="4">GS</text>

  <!-- Sparkle top-left -->
  <g filter="url(#glow)" opacity="0.9">
    <polygon points="90,90 96,110 116,90 96,70" fill="#f0dea0"/>
    <polygon points="90,90 70,96 90,116 110,96" fill="#debb50"/>
  </g>

  <!-- Sparkle top-right -->
  <g filter="url(#glow)" opacity="0.8">
    <polygon points="422,78 426,92 440,78 426,64" fill="#f0dea0"/>
    <polygon points="422,78 408,82 422,96 436,82" fill="#debb50"/>
  </g>

  <!-- Sparkle bottom-right -->
  <g filter="url(#glow)" opacity="0.7">
    <polygon points="400,400 403,410 413,400 403,390" fill="#f0dea0"/>
  </g>
</svg>
